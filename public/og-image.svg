<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#d4d0cd"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Dot grid -->
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#111111"/>

  <!-- Top right corner decoration -->
  <rect x="1100" y="0" width="100" height="8" fill="#111111" opacity="0.12"/>

  <!-- Main card -->
  <rect x="80" y="80" width="780" height="470" rx="24" fill="#ffffff" stroke="#e8e8e8" stroke-width="1.5"/>

  <!-- Card header bar -->
  <rect x="80" y="80" width="780" height="70" rx="24" fill="#111111"/>
  <rect x="80" y="120" width="780" height="30" fill="#111111"/>

  <!-- Header dots -->
  <circle cx="114" cy="115" r="6" fill="white" fill-opacity="0.25"/>
  <circle cx="136" cy="115" r="6" fill="white" fill-opacity="0.25"/>
  <circle cx="158" cy="115" r="6" fill="white" fill-opacity="0.25"/>

  <!-- Header URL bar -->
  <rect x="186" y="108" width="200" height="14" rx="7" fill="white" fill-opacity="0.12"/>
  <text x="286" y="120" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle">infoia.es</text>

  <!-- Badge -->
  <rect x="112" y="178" width="200" height="30" rx="15" fill="#111111" fill-opacity="0.07" stroke="#111111" stroke-width="1" stroke-opacity="0.12"/>
  <circle cx="128" cy="193" r="5" fill="#111111"/>
  <text x="145" y="198" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#111111" letter-spacing="0.5">Automatización · IA · Webs</text>

  <!-- Main headline -->
  <text x="112" y="265" font-family="'Bricolage Grotesque',system-ui,sans-serif" font-size="56" font-weight="800" fill="#111111" letter-spacing="-2">Automatiza.</text>
  <text x="112" y="330" font-family="'Bricolage Grotesque',system-ui,sans-serif" font-size="56" font-weight="800" fill="#111111" letter-spacing="-2">Convierte.</text>
  <text x="112" y="395" font-family="'Bricolage Grotesque',system-ui,sans-serif" font-size="56" font-weight="800" fill="#111111" letter-spacing="-2">Crece.</text>

  <!-- Subline -->
  <text x="112" y="440" font-family="system-ui,sans-serif" font-size="17" fill="#6b7280" font-weight="400">Sin tecnicismos. Con resultados reales.</text>

  <!-- CTA pill -->
  <rect x="112" y="462" width="190" height="42" rx="21" fill="#111111"/>
  <text x="207" y="488" font-family="'Bricolage Grotesque',system-ui,sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">Consulta gratuita →</text>

  <!-- Right side visual panel -->
  <rect x="900" y="100" width="260" height="430" rx="16" fill="#111111"/>

  <!-- Stats in right panel -->
  <text x="1030" y="175" font-family="'Bricolage Grotesque',system-ui,sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle">40%</text>
  <text x="1030" y="200" font-family="system-ui,sans-serif" font-size="13" fill="white" fill-opacity="0.55" text-anchor="middle">menos tareas manuales</text>

  <rect x="920" y="218" width="220" height="1" fill="white" fill-opacity="0.1"/>

  <text x="1030" y="270" font-family="'Bricolage Grotesque',system-ui,sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle">15h</text>
  <text x="1030" y="295" font-family="system-ui,sans-serif" font-size="13" fill="white" fill-opacity="0.55" text-anchor="middle">recuperadas por semana</text>

  <rect x="920" y="313" width="220" height="1" fill="white" fill-opacity="0.1"/>

  <text x="1030" y="365" font-family="'Bricolage Grotesque',system-ui,sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle">3×</text>
  <text x="1030" y="390" font-family="system-ui,sans-serif" font-size="13" fill="white" fill-opacity="0.55" text-anchor="middle">más conversiones web</text>

  <rect x="920" y="408" width="220" height="1" fill="white" fill-opacity="0.1"/>

  <!-- Free label -->
  <rect x="940" y="430" width="180" height="44" rx="12" fill="white" fill-opacity="0.1"/>
  <text x="1030" y="458" font-family="'Bricolage Grotesque',system-ui,sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">Primera consulta: 0€</text>

  <!-- InfoIA logo text at bottom -->
  <text x="80" y="597" font-family="'Bricolage Grotesque',system-ui,sans-serif" font-size="22" font-weight="800" fill="#111111" letter-spacing="-0.5">InfoIA</text>
  <text x="152" y="597" font-family="system-ui,sans-serif" font-size="14" fill="#9ca3af" font-weight="400">— infoia.es</text>

  <!-- Bottom right tag -->
  <text x="1170" y="597" font-family="system-ui,sans-serif" font-size="13" fill="#9ca3af" text-anchor="end">Automatización · IA · Webs para empresas</text>
</svg>
